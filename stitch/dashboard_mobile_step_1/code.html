<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0a111f",
                        "accent": "#00D4AA",
                        "background-light": "#f6f7f8",
                        "background-dark": "#14171e",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-accent text-xl">package_2</span>
</div>
<h1 class="text-lg font-bold tracking-tight">PackMach AI</h1>
</div>
<div class="flex items-center gap-3">
<span class="bg-accent/10 text-accent text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">
                3 / 5 generations
            </span>
<button class="p-2 hover:bg-primary/5 rounded-full transition-colors">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Progress Section -->
<div class="p-6 bg-white dark:bg-slate-900/50 mb-4">
<div class="flex justify-between items-end mb-3">
<div>
<p class="text-xs font-bold text-primary/60 dark:text-slate-400 uppercase tracking-widest">Step 1 of 4</p>
<h2 class="text-xl font-bold">Product Details</h2>
</div>
<p class="text-sm font-medium text-accent">25% Complete</p>
</div>
<div class="w-full h-2 bg-primary/10 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-accent w-1/4 rounded-full"></div>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-6">
<!-- Product Name -->
<div class="space-y-2">
<label class="text-sm font-bold text-primary/80 dark:text-slate-300 ml-1">Product Name</label>
<input class="w-full h-14 bg-white dark:bg-slate-900 border border-primary/10 dark:border-slate-800 rounded-2xl px-4 focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none" placeholder="e.g. Organic Matcha Latte Mix" type="text"/>
</div>
<!-- Category Scrollable Icons -->
<div class="space-y-2">
<label class="text-sm font-bold text-primary/80 dark:text-slate-300 ml-1">Category</label>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-accent bg-accent/5 transition-all">
<span class="material-symbols-outlined text-accent">local_cafe</span>
<span class="text-xs font-bold">Beverage</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-transparent bg-white dark:bg-slate-900 transition-all">
<span class="material-symbols-outlined text-slate-400">restaurant</span>
<span class="text-xs font-bold">Food</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-transparent bg-white dark:bg-slate-900 transition-all">
<span class="material-symbols-outlined text-slate-400">face</span>
<span class="text-xs font-bold">Beauty</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-transparent bg-white dark:bg-slate-900 transition-all">
<span class="material-symbols-outlined text-slate-400">medication</span>
<span class="text-xs font-bold">Health</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-2 p-4 rounded-2xl border-2 border-transparent bg-white dark:bg-slate-900 transition-all">
<span class="material-symbols-outlined text-slate-400">home</span>
<span class="text-xs font-bold">Home</span>
</button>
</div>
</div>
<!-- Product Description -->
<div class="space-y-2">
<label class="text-sm font-bold text-primary/80 dark:text-slate-300 ml-1">Product Description</label>
<textarea class="w-full bg-white dark:bg-slate-900 border border-primary/10 dark:border-slate-800 rounded-2xl p-4 focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none resize-none" placeholder="Describe your product's vibe, target audience, and key ingredients..." rows="4"></textarea>
</div>
<!-- Logo Upload -->
<div class="space-y-2">
<label class="text-sm font-bold text-primary/80 dark:text-slate-300 ml-1">Brand Logo (Optional)</label>
<div class="border-2 border-dashed border-primary/10 dark:border-slate-800 rounded-2xl p-8 flex flex-col items-center justify-center bg-white/50 dark:bg-slate-900/50">
<span class="material-symbols-outlined text-4xl text-primary/20 dark:text-slate-700 mb-2">cloud_upload</span>
<p class="text-sm text-primary/60 dark:text-slate-400 font-medium">Tap to upload or drag &amp; drop</p>
<p class="text-[10px] text-primary/40 dark:text-slate-500 mt-1">PNG, JPG up to 5MB</p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation & Action Bar -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<!-- Floating Primary Action -->
<div class="px-4 pb-4">
<button class="w-full h-14 bg-primary text-white dark:bg-accent dark:text-primary rounded-2xl font-bold flex items-center justify-center gap-2 shadow-xl shadow-primary/20 dark:shadow-accent/10 active:scale-[0.98] transition-all">
                Continue to Step 2
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Tab Bar -->
<nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-primary/5 dark:border-slate-800 px-6 py-2 pb-6 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary dark:text-accent" href="#">
<span class="material-symbols-outlined fill-[1]">grid_view</span>
<span class="text-[10px] font-bold">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/40 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/40 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">bar_chart_4_bars</span>
<span class="text-[10px] font-bold">Usage</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/40 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</a>
</nav>
</div>
</body></html>
